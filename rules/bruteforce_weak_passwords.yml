title: SSH Brute-Force with Common Weak Passwords
id: a1f3c9e2-0005-4a10-9c01-sigmaforge0005
status: experimental
description: >
  Detects SSH authentication attempts using passwords from a common weak /
  top-credential list. High volume from a single source indicates dictionary
  brute-forcing.
references:
  - Ironside honeypot telemetry, 2026-06-14
author: Claude (IGRIS Sigma-Forge)
date: 2026-06-18
logsource:
  product: cowrie
  service: ssh
detection:
  selection:
    eventid|startswith: cowrie.login
    password:
      - "123456"
      - "12345678"
      - "1234567890"
      - "qwer1234"
      - "1234qwer"
  condition: selection
fields:
  - src_ip
  - username
  - password
level: low
tags:
  - attack.credential_access
  - attack.t1110.001
